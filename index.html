<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jacky LinPeng | Cool Blog</title>
  <meta name="description" content="一个酷炫、动效丰富的个人博客静态页面。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
  </div>

  <header class="topbar">
    <a class="brand" href="#top">JACKY / BLOG</a>
    <nav>
      <a href="#repos">项目</a>
      <a href="#lab">实验室</a>
      <a href="#contact">联系</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero reveal">
      <div class="hero-copy">
        <p class="eyebrow">BUILD WITH FOCUS · KEEP IT SIMPLE</p>
        <h1 class="title">专注，Keep It Simple Stupid</h1>
        <p id="typed-line" class="typed-line"></p>
        <div class="hero-actions">
          <a id="github-link" class="btn btn-primary" href="#" target="_blank" rel="noreferrer">访问 GitHub</a>
          <a class="btn btn-ghost" href="#repos">仓库</a>
        </div>
      </div>

      <div class="device-stage" id="device-stage">
        <article class="device laptop tilt-card">
          <div class="bezel"></div>
          <div class="screen smoke"></div>
          <p class="device-label">DESKTOP VIEW</p>
        </article>

        <article class="device tablet tilt-card">
          <div class="bezel"></div>
          <div class="screen panel-ui"></div>
          <p class="device-label">TABLET VIEW</p>
        </article>

        <article class="device phone tilt-card">
          <div class="bezel"></div>
          <div class="screen timeline-ui"></div>
          <p class="device-label">MOBILE VIEW</p>
        </article>
      </div>
    </section>

    <section id="repos" class="panel reveal">
      <div class="section-head">
        <h2>精选仓库</h2>
        <a id="all-repos-link" href="#" target="_blank" rel="noreferrer">查看全部</a>
      </div>
      <ul class="stats">
        <li><strong id="repo-count">--</strong><span>公开仓库</span></li>
        <li><strong id="star-count">--</strong><span>累计 Stars</span></li>
        <li><strong id="follower-count">--</strong><span>关注者</span></li>
      </ul>
      <div id="repo-grid" class="repo-grid">
        <p class="placeholder">正在加载仓库...</p>
      </div>
    </section>

    <section id="lab" class="panel reveal">
      <h2>交互实验室</h2>
      <p>点击下面的模式卡片，右侧会切换不同展示态。</p>
      <div class="showcase-wrap">
        <div id="signal-grid" class="signal-grid"></div>
        <article class="signal-stage">
          <p id="signal-kicker" class="signal-kicker"></p>
          <h3 id="signal-title"></h3>
          <p id="signal-copy"></p>
          <div id="signal-tags" class="signal-tags"></div>
        </article>
      </div>
    </section>
  </main>

  <footer id="contact" class="footer reveal">
    <p>Connect</p>
    <div class="links">
      <a id="contact-github" href="#" target="_blank" rel="noreferrer">GitHub</a>
      <a href="mailto:hello@example.com">Email</a>
      <a href="https://x.com/" target="_blank" rel="noreferrer">X / Twitter</a>
    </div>
    <small>© <span id="year"></span> Jacky LinPeng</small>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
